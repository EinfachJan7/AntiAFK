name: AntiAFK
version: 1.0.0
main: de.antiafk.AntiAFK
description: Ein Anti-AFK Plugin, das inaktive Spieler teleportiert oder Befehle ausführt
api-version: "1.21"
author: Admin
commands:
  antiafk:
    description: AntiAFK Befehle - /antiafk status|reload|check <Spieler>
    usage: /antiafk <command>
    aliases: [aafk]
permissions:
  antiafk.admin:
    description: Admin-Befehle für AntiAFK
    default: op
  antiafk.exempt:
    description: Befreit den Spieler von Anti-AFK
    default: false
