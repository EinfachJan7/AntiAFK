# ====================================
# AntiAFK Plugin Configuration
# ====================================

# Aktiviere/Deaktiviere das Plugin
enabled: true

# ====================================
# AFK EINSTELLUNGEN
# ====================================

# Zeit in Sekunden bis ein Spieler als AFK gilt
# Standard: 300 = 5 Minuten
afk-timeout: 1200

# Überprüfungsintervall in Sekunden
# Wie oft soll das Plugin prüfen ob Spieler AFK sind
check-interval: 1

# Stats-Update Intervall in Sekunden
# Wie oft sollen die AFK-Statistiken aktualisiert/gespeichert werden
# Wenn 0: Nur speichern wenn Spieler AFK-Status beendet
# Standard: 60 = Alle 60 Sekunden
stats-update-interval: 30

# ====================================
# PLACEHOLDER-EINSTELLUNGEN
# ====================================

# Zeige Sekunden in Placeholders an? (z.B. "2h 30m 45s" statt "2h 30m")
# Standard: false = Nur Stunden/Minuten
placeholder-show-seconds: false

# ====================================
# BEFEHLE
# ====================================

# Befehl wenn Spieler AFK wird (einmalig)
# Variablen: %player% = Spielername, %uuid% = Spieler UUID
# Beispiele:
#   - "say <red>%player% ist AFK"
#   - "kick %player% AFK"
#   - "tp %player% 0 0 0"
command: "afk"

# Befehl wenn Spieler NICHT MEHR AFK ist (verlässt AFK-Status)
# Wird nur ausgeführt wenn Spieler sich bewegt und war davor AFK
# Variablen: %player%, %uuid%
command-back: "back"

# ====================================
# NACHRICHTEN (Kommandos)
# ====================================

# Status Befehle (/antiafk status)
status-message-header: "<#E0BBE4>=== AntiAFK Status ==="
status-message-enabled: "<#BAFFC9>Status: <#90EE90>AKTIV"
status-message-disabled: "<#FFB3BA>Status: <#FF6B6B>DEAKTIV"
status-message-timeout: "<#BAE1FF>AFK-Timeout: <#FFFFBA>%timeout% Sekunden"
status-message-interval: "<#BAE1FF>Check-Interval: <#FFFFBA>%interval% Sekunden"
status-message-stats-update-interval: "<#BAFFC9>▶ Stats-Update Interval: <#FFA500>%stats-update-interval% Sekunden"
status-message-players: "<#BAE1FF>Online Spieler: <#FFFFBA>%players%"

# Reload Befehle (/antiafk reload)
reload-success: "<#BAFFC9>✓ AntiAFK Config reloaded!"
reload-error: "<#FFB3BA>✗ Fehler beim Reload!"

# Hilfe Befehle
help-status: "<#FFFFBA>/antiafk <#BAE1FF>- Zeigt Status"
help-reload: "<#FFFFBA>/antiafk reload <#BAE1FF>- Lädt Config neu"
help-check: "<#FFFFBA>/antiafk check <Spieler> <#BAE1FF>- Prüft AFK-Zeit"
help-stats: "<#FFFFBA>/antiafk stats <Spieler> <#BAE1FF>- Zeigt AFK-Statistiken"
help-reset: "<#FFFFBA>/antiafk reset <Spieler> <time|count|all> <#BAE1FF>- Setzt Stats zurück"
no-permission: "<#FFB3BA>Keine Berechtigung!"

# Stats Befehle (/antiafk stats)
stats-message-header: "<#E0BBE4>=== %player% AFK-Statistiken ==="
stats-message-total-time: "<#BAFFC9>Gesamt AFK-Zeit: <#FFFFBA>%time%"
stats-message-afk-count: "<#BAFFC9>AFK-Vorkommnisse: <#FFFFBA>%count%"
stats-message-last-afk: "<#BAFFC9>Letzter AFK: <#FFFFBA>%date%"
stats-message-first-recorded: "<#BAFFC9>Erstes Aufzeichnen: <#FFFFBA>%date%"
stats-message-not-found: "<#FFB3BA>❌ Spieler <#E0BBE4>%player% <#FFB3BA>nicht gefunden!"

# Reset Befehle (/antiafk reset)
reset-success-time: "<#BAFFC9>✓ AFK-Zeit von <#E0BBE4>%player% <#BAFFC9>zurückgesetzt!"
reset-success-count: "<#BAFFC9>✓ AFK-Vorkommnisse von <#E0BBE4>%player% <#BAFFC9>zurückgesetzt!"
reset-success-all: "<#BAFFC9>✓ Alle Stats von <#E0BBE4>%player% <#BAFFC9>zurückgesetzt!"
reset-invalid-option: "<#FFB3BA>❌ Ungültige Option: <#E0BBE4>%option% <#FFB3BA>Nutze: time|count|all"
reset-player-not-found: "<#FFB3BA>❌ Spieler <#E0BBE4>%player% <#FFB3BA>nicht gefunden!"

# ====================================
# DATENBANK EINSTELLUNGEN
# ====================================

database:
  # Aktiviere/Deaktiviere MySQL Datenbankunterstützung
  enabled: false
  
  # MySQL Server Einstellungen
  host: "localhost"
  port: 3306
  name: "antiafk"
  user: "root"
  password: ""

